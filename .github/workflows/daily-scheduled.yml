name: 每日金融日报（定时）

on:
  schedule:
    # 北京 05:59 = UTC 21:59(前日) | 叠加~52min调度延迟 → 实际约北京 06:51(≈07:00)
    - cron: "59 21 * * *"
  workflow_dispatch:
    inputs:
      skip_mp3:
        description: "跳过 MP3 生成"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-report
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install akshare requests pandas yfinance edge-tts lxml curl_cffi pandas_market_calendars

      - name: 预抓取数据
        id: prefetch
        continue-on-error: true
        run: |
          echo "预抓取数据..."
          python3 scripts/prefetch_data.py || echo "预抓取部分失败，LLM将使用现有数据"

      - name: 展示预抓取结果
        if: always()
        run: |
          echo "预抓取 JSON 文件:"
          ls -la data_*.json 2>/dev/null || echo "(暂无)"

      - name: 调用 LLM 生成日报
        id: call_llm
        run: |
          echo "调用 LLM 生成报告..."
          python3 scripts/call_llm.py
          echo "报告生成完成"
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}

      - name: 转换日报为广播稿
        id: md_to_script
        continue-on-error: true
        run: |
          echo "转换日报为广播稿..."
          python3 scripts/md_to_script.py
          echo "广播稿生成完成"
        env:
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

      - name: 生成 MP3 音频
        id: md_to_mp3
        continue-on-error: true
        if: ${{ !inputs.skip_mp3 }}
        run: |
          echo "生成 MP3 音频..."
          python3 scripts/md_to_mp3.py

      - name: 转换 MD → HTML
        id: md_to_html
        run: |
          echo "转换 MD → HTML..."
          python3 scripts/md_to_reader.py report.md daily-report.html
          echo "HTML 生成完成"

      - name: 部署到主分支 docs/ 目录
        if: always()
        run: |
          mkdir -p docs
          cp daily-report.html docs/ 2>/dev/null || true
          cp report.md docs/daily-report.md 2>/dev/null || true
          cp daily-report.mp3 docs/ 2>/dev/null || true
          cp web/sw.js docs/ 2>/dev/null || true
          cp daily-report.html docs/index.html 2>/dev/null || true
          touch docs/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git add qdii_prev.json 2>/dev/null || true   # 留存昨日 QDII 基准，供跨运行对比
          git diff --staged --quiet || git commit -m "每日日报 $(date +%Y-%m-%d)"
          git push
